# ============================================================
# docker-compose.yml — Contratos IDAF/AC
# Serviços: app (PHP+Apache) · db (MySQL 8) · pma (phpMyAdmin)
# ============================================================

version: '3.9'

services:

  # ── Aplicação PHP + Apache ─────────────────────────────────
  app:
    build: .
    container_name: contratos_app
    restart: unless-stopped
    ports:
      - "8080:80"          # acesse em http://localhost:8080/contratos
    environment:
      DB_HOST: db
      DB_NAME: contratos_idaf
      DB_USER: root
      DB_PASS: root
    volumes:
      - ./uploads:/var/www/html/uploads   # persiste uploads fora do container
    depends_on:
      db:
        condition: service_healthy

  # ── MySQL 8 ───────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: contratos_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: contratos_idaf
      MYSQL_ROOT_HOST: '%'
    volumes:
      - db_data:/var/lib/mysql                            # dados persistentes
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql  # cria tabelas na 1ª execução
    ports:
      - "3307:3306"        # evita conflito com MySQL local
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ── phpMyAdmin (opcional) ──────────────────────────────────
  pma:
    image: phpmyadmin:latest
    container_name: contratos_pma
    restart: unless-stopped
    ports:
      - "8081:80"          # acesse em http://localhost:8081
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 25M
    depends_on:
      - db

# ── Volumes nomeados ──────────────────────────────────────────
volumes:
  db_data:
